spring:
  application:
    name: bookverse

  # Dev tooling
  profiles:
    active: development

  devtools:
    restart:
      enabled: true

  # Database
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # File upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Pagination
  data:
    web:
      pageable:
        one-indexed-parameters: true

# Logging
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# BookVerse custom configuration
bookverse:
  jwt:
    base64-secret: ${BOOKVERSE_JWT_BASE64_SECRET}
    access-token-validity-in-seconds: ${BOOKVERSE_JWT_ACCESS_TOKEN_VALIDITY:100000}
    refresh-token-validity-in-seconds: ${BOOKVERSE_JWT_REFRESH_TOKEN_VALIDITY:864000}

  upload-file:
    base-uri: ${BOOKVERSE_UPLOAD_BASE_URI}

  vnpay:
    tmn-code: ${BOOKVERSE_VNPAY_TMN_CODE}
    hash-secret: ${BOOKVERSE_VNPAY_HASH_SECRET}
    payment-url: ${BOOKVERSE_VNPAY_PAYMENT_URL}
    return-url: ${BOOKVERSE_VNPAY_RETURN_URL}
    frontend-success-url: ${BOOKVERSE_VNPAY_FRONTEND_SUCCESS_URL}
    frontend-fail-url: ${BOOKVERSE_VNPAY_FRONTEND_FAIL_URL}

